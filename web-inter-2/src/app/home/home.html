<main class="grid grid-cols-[7fr_3fr] h-screen w-screen p-6 gap-6 bg-[#f4f6f8]">
  
  <div class="w-full h-full rounded-lg overflow-hidden shadow-md border-8 border-white bg-white">
    <arcgis-map
      basemap="topo-vector"
      center="-117.15, 32.71" 
      zoom="10"
      (arcgisViewReadyChange)="arcgisViewReadyChange($event)"
      class="w-full h-full"
    ></arcgis-map>
  </div>

  <div class="flex flex-col gap-3 h-full overflow-y-auto pr-2">
    
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">San Diego</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">National City</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">Coronado</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">Lemon Grove</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">La Mesa</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">Chula Vista</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">Bonita</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">La Presa</div>
    <div class="bg-[#f09c74] text-gray-800 px-4 py-3 rounded-md shadow-sm font-medium">Imperial Beach</div>

  </div>

</main>
