<main class="grid grid-cols-[8fr_4fr] h-screen w-screen p-4 gap-4 bg-gray-100">
  
  <arcgis-map
    basemap="topo-vector"
    center="-100, 40"
    zoom="6"
    (arcgisViewReadyChange)="arcgisViewReadyChange($event)"
    class="w-full h-full border border-gray-300 bg-white"
  ></arcgis-map>

  <div class="overflow-y-auto bg-white border border-gray-300 h-full">
    
    <table class="min-w-full text-left text-sm text-gray-800 border-collapse">
        
        <thead class="bg-[#F07A5F] text-white sticky top-0 z-10">
            <tr>
                <th scope="col" class="px-4 py-3 border border-gray-300 font-semibold">Subregion</th>
                <th scope="col" class="px-4 py-3 border border-gray-300 font-semibold">State Name (Full)</th>
                <th scope="col" class="px-4 py-3 border border-gray-300 font-semibold">State Name (Abbr.)</th>
            </tr>
        </thead>

        <tbody class="bg-white">
            @for (feature of allData(); track feature.attributes.objectid) {
                <tr class="cursor-pointer" (click)="changeLocationTo(feature)" [ngClass] = "selectedObjectId() === feature.attributes.objectid ? 'bg-[#e7a292]' : ''">
                    <td class="px-4 py-2 border border-gray-300">
                        {{feature.attributes.sub_region}}
                    </td>
                    <td class="px-4 py-2 border border-gray-300">
                        {{feature.attributes.state_name}}
                    </td>
                    <td class="px-4 py-2 border border-gray-300">
                        {{feature.attributes.state_abbr}}
                    </td>
                </tr>
            } 
            @empty {
                <tr>
                    <td colspan="3" class="px-4 py-12 text-center text-gray-400 border border-gray-300">
                        กำลังดึงข้อมูลจากแผนที่...
                    </td>
                </tr>
            }
        </tbody>
    </table>
  </div>
</main>
