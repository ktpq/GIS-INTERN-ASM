<style>
  arcgis-map {
    display: block;
    width: 100%;
    height: 100vh; /* ให้สูง 80% ของหน้าจอ หรือจะระบุเป็น px เช่น 500px ก็ได้ */
  }
</style>

<arcgis-map
  basemap="topo-vector"
  center="-118.805, 34.027"
  zoom="10"
  (arcgisViewReadyChange)="arcgisViewReadyChange($event)"
>
  
  <arcgis-zoom></arcgis-zoom>
  <arcgis-layer-list slot="top-right"></arcgis-layer-list>
  <arcgis-legend slot="bottom-right"></arcgis-legend>
  <arcgis-scale-bar slot="bottom-left"></arcgis-scale-bar>
</arcgis-map>
